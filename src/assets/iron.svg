<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f7d3a" />
      <stop offset="100%" stop-color="#2c5c29" />
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcdcd8" />
      <stop offset="50%" stop-color="#b7b7b2" />
      <stop offset="100%" stop-color="#84847f" />
    </linearGradient>
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a4a4a" />
      <stop offset="100%" stop-color="#1c1c1c" />
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.35)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#grass)" />
  <ellipse cx="205" cy="235" rx="75" ry="13" fill="url(#shadow)" />

  <!-- shaft, angled slightly like an address position -->
  <rect x="190" y="55" width="8" height="105" rx="4" fill="url(#shaft)" transform="rotate(8 194 107)" />

  <!-- iron head: thin blade, flat sole, angled top edge (loft), tapering heel to toe -->
  <path d="M 168,165
           L 178,130
           C 180,122 186,118 195,118
           L 258,122
           C 266,123 271,129 268,138
           L 250,178
           C 247,186 240,190 232,189
           L 178,182
           C 172,181 167,174 168,165 Z"
        fill="url(#metal)" stroke="#6f6f6a" stroke-width="1.5" />

  <!-- grooves -->
  <line x1="195" y1="140" x2="245" y2="144" stroke="#6f6f6a" stroke-width="1" opacity="0.6" />
  <line x1="192" y1="150" x2="240" y2="154" stroke="#6f6f6a" stroke-width="1" opacity="0.6" />
  <line x1="188" y1="160" x2="235" y2="163" stroke="#6f6f6a" stroke-width="1" opacity="0.6" />
</svg>
