<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f7d3a" />
      <stop offset="100%" stop-color="#2c5c29" />
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3a" />
      <stop offset="50%" stop-color="#232323" />
      <stop offset="100%" stop-color="#151515" />
    </linearGradient>
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a5a5a" />
      <stop offset="100%" stop-color="#242424" />
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.35)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#grass)" />
  <ellipse cx="205" cy="238" rx="82" ry="13" fill="url(#shadow)" />

  <!-- near-upright shaft typical of a putter -->
  <rect x="197" y="48" width="8" height="112" rx="4" fill="url(#shaft)" transform="rotate(3 201 104)" />

  <!-- mallet putter head: flat rectangular block -->
  <rect x="156" y="158" width="108" height="40" rx="8" fill="url(#metal)" stroke="#050505" stroke-width="1.5" />

  <!-- alignment line -->
  <rect x="196" y="164" width="8" height="28" fill="#f2f2f0" opacity="0.9" />
</svg>
