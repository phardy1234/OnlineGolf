<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f7d3a" />
      <stop offset="100%" stop-color="#2c5c29" />
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2f2f0" />
      <stop offset="45%" stop-color="#cfcfca" />
      <stop offset="100%" stop-color="#8f8f8a" />
    </linearGradient>
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a4a4a" />
      <stop offset="100%" stop-color="#1c1c1c" />
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.35)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#grass)" />
  <ellipse cx="205" cy="240" rx="80" ry="14" fill="url(#shadow)" />

  <!-- shaft -->
  <rect x="192" y="50" width="8" height="100" rx="4" fill="url(#shaft)" />

  <!-- fairway wood head: smaller, more tapered/teardrop toward the back -->
  <path d="M 176,140
           L 176,172
           C 176,186 186,196 200,199
           C 228,205 258,192 268,168
           C 276,148 268,126 246,116
           C 226,107 202,109 186,120
           C 180,125 176,132 176,140 Z"
        fill="url(#metal)" stroke="#7a7a76" stroke-width="1.5" />

  <path d="M 176,142 C 181,138 186,136 191,136" stroke="#7a7a76" stroke-width="1.5" fill="none" opacity="0.7" />
</svg>
